<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wallet History</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 p-4">

<div class="flex justify-between mb-4">

<h1 class="text-xl font-bold">Wallet History</h1>

<button onclick="goBack()"
class="bg-gray-500 text-white px-3 py-1 rounded">
Back
</button>

</div>

<div id="walletContainer" class="space-y-3"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyCMb2Trmtww1wUVGC9s4ndKd7_M06nIg9Y",
authDomain:"dk-web-af36a.firebaseapp.com",
projectId:"dk-web-af36a",
storageBucket:"dk-web-af36a.appspot.com",
messagingSenderId:"963722080614",
appId:"1:963722080614:web:7adcb518ea9a06c33358a7",
databaseURL:"https://dk-web-af36a-default-rtdb.firebaseio.com"
}

const app=initializeApp(firebaseConfig)
const auth=getAuth()
const db=getDatabase()

window.goBack=function(){
location.href="user.dashboard.html"
}

async function loadWallet(){

const uid = auth.currentUser.uid

const snap = await get(ref(db,"wallet_history/"+uid))

const container = document.getElementById("walletContainer")

container.innerHTML=""

if(!snap.exists()){
container.innerHTML="<p>No wallet history found</p>"
return
}

const data = snap.val()

const sorted = Object.values(data).sort((a,b)=> b.timestamp - a.timestamp)

sorted.forEach(tx=>{

const color = tx.type==="credit" ? "text-green-600" : "text-red-600"

container.innerHTML += `

<div class="bg-white p-4 rounded shadow">

<div class="flex justify-between">

<div>
<p class="font-semibold">${tx.reason}</p>
<p class="text-sm text-gray-500">${tx.date} ${tx.time}</p>
</div>

<div class="${color} font-bold">
${tx.type==="credit" ? "+" : "-"} ₹${tx.amount}
</div>

</div>

</div>

`

})

}

auth.onAuthStateChanged(user=>{
if(user) loadWallet()
})

</script>

</body>
</html>
